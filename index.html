<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACID MODS — Твои любимые моды и карты</title>
    <meta name="description" content="Лучшие постройки и моды в уникальном кислотном дизайне.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo">ACID<span>MODS</span></div>
        <nav>
            <a href="#">Моды</a>
            <a href="#">Карты</a>
            <a href="#">Паки</a>
        </nav>
    </header>

    <main class="container">
        <h1 class="title">Свежие релизы</h1>
        
        <div class="grid">
            <div class="card">
                <div class="card-image"></div>
                <div class="card-content">
                    <h3>Neon City Map</h3>
                    <p>Потрясающая карта города в стиле киберпанк.</p>
                    <div class="tags">
                        <span class="tag green">Карты</span>
                        <span class="tag pink">1.20.1</span>
                    </div>
                    <button class="btn">СКАЧАТЬ</button>
                </div>
            </div>

            <div class="card">
                <div class="card-image"></div>
                <div class="card-content">
                    <h3>Acid Resource Pack</h3>
                    <p>Заменяет все текстуры на неоновые.</p>
                    <div class="tags">
                        <span class="tag green">Текстуры</span>
                        <span class="tag pink">1.19+</span>
                    </div>
                    <button class="btn">СКАЧАТЬ</button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
